<!DOCTYPE html>

<html>

<head>

<title>Task Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<h2>Register</h2>

<input id="reg_user" placeholder="username">

<input id="reg_pass" placeholder="password">

<button onclick="register()">Register</button>



<h2>Login</h2>

<input id="login_user" placeholder="username">

<input id="login_pass" placeholder="password">

<button onclick="login()">Login</button>



<h2>Create Task</h2>

<input id="task_title" placeholder="task title">

<input id="task_desc" placeholder="description">

<button onclick="createTask()">Add Task</button>



<h2>Tasks</h2>

<ul id="tasks"></ul>


<script src="script.js"></script>


</body>

</html>
